<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOD SPOT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">Food Spot</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Products Section -->
    <section class="products">
        <h2>Our Products</h2>

        <div class="product">
            <img src="./Burger.jpg" alt="Burger">
            <div>
                <h3>Cheese Burger</h3>
                <p>Tasty burger with fresh ingredients</p>
                <a href="#">Order Now</a>
            </div>
        </div>

        <div class="product">
            <img src="./Pizza.jpg" alt="Pizza">
            <div>
                <h3>Veg Pizza</h3>
                <p>Hot pizza with extra cheese</p>
                <a href="#">Order Now</a>
            </div>
        </div>

        <div class="product">
            <img src="./French fries.jpg" alt="French fries">
            <div>
                <h3>French fries</h3>
                <p>Tasty and crispy</p>
                <a href="#">Order Now</a>
            </div>
        </div>

    </section>

</body>
</html>
