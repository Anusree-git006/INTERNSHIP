<!DOCTYPE html>
<html>
<head>
    <title>Minimum Length Validation</title>
</head>
<body>
    
    <h2>Login Form (Min Length)</h2>
    
    <form onsubmit="return validateForm()">
        Username: <input type="text" id="username"><br><br>
        Password: <input type="password" id="password"><br><br>
        <button type="submit">Login</button>
        </form>
        
        <p id="error" style="color:red;"></p>
        
        <script>
        function validateForm() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;
            
            if (user.length < 4) {
                document.getElementById("error").textContent = "Username must be at least 4 characters";
                return false;
            }
            
            if (pass.length < 6) {
                document.getElementById("error").textContent = "Password must be at least 6 characters";
                return false;
            }
        }
        </script>

</body>
</html>
