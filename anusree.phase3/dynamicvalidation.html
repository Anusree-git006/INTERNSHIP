<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Validation</title>
</head>
<body>
    
    <h2>Login Form (Dynamic Errors)</h2>
    
    <form id="loginForm">
        Username: <input type="text" id="username"><br>
        <span id="userError" style="color:red;"></span><br>
        
        Password: <input type="password" id="password"><br>
        <span id="passError" style="color:red;"></span><br><br>
        
        <button type="submit">Login</button>
    </form>
    
    <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        let user = document.getElementById("username").value.trim();
        let pass = document.getElementById("password").value.trim();
        
        let userError = document.getElementById("userError");
        let passError = document.getElementById("passError");
        
        userError.textContent = "";
        passError.textContent = "";
        
        let valid = true;
        
        if (user === "") {
            userError.textContent = "Username required";
            valid = false;
        } else if (user.length < 4) {
            userError.textContent = "Minimum 4 characters";
            valid = false;
        }
        
        if (pass === "") {
            passError.textContent = "Password required";
            valid = false;
        } else if (pass.length < 6) {
            passError.textContent = "Minimum 6 characters";
            valid = false;
        }
        
        if (valid) {
            alert("Login Successful!");
        }
    });
    </script>

</body>
</html>
