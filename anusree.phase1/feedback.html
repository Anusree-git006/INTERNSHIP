<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>
<body>

    <h1>Feedback Form</h1>

    <form>
        Your Feedback:<br>
        <textarea rows="5" cols="30"></textarea><br><br>

        Rating:<br>
        <select>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select><br><br>

        <input type="submit" value="Submit">
    </form>

</body>
</html>
