<!DOCTYPE html>
<html>
<head>
<style>
.block {
  display: block;
  background: lightpink;
  margin: 5px;
}

.inline {
  display: inline;
  background: lightgreen;
}

.inline-block {
  display: inline-block;
  width: 100px;
  height: 50px;
  background: orange;
  margin: 5px;
}

.none {
  display: none;
}
</style>
</head>
<body>

<h2>Block</h2>
<span class="block">Block 1</span>
<span class="block">Block 2</span>

<h2>Inline</h2>
<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<h2>Inline-Block</h2>
<div class="inline-block">Box 1</div>
<div class="inline-block">Box 2</div>

<h2>None</h2>
<p class="none">Hidden Text</p>
<p>Visible Text</p>

</body>
</html>
