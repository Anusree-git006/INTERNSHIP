<!DOCTYPE html>
<html>
<head>
  <title>Flexbox Demo</title>
  <style>
    body {
      font-family: Arial;
    }

    h2 {
      text-align: center;
    }

    /* FLEX CONTAINER */
    .container {
      display: flex;
      flex-direction: row;        /* row | column */
      justify-content: space-around; /* center | space-between | space-evenly */
      align-items: center;        /* stretch | flex-start | flex-end */
      flex-wrap: wrap;            /* wrap items */
      align-content: space-between;
      gap: 10px;

      height: 300px;
      border: 2px solid black;
      padding: 10px;
    }

    /* FLEX ITEMS */
    .box {
      background-color: lightblue;
      border: 1px solid black;
      padding: 20px;
      text-align: center;
      font-weight: bold;
    }

    /* Individual flex properties */
    .box1 {
      flex-grow: 1;
    }

    .box2 {
      flex-grow: 2;
    }

    .box3 {
      flex-shrink: 2;
    }

    .box4 {
      flex-basis: 150px;
    }

    .box5 {
      align-self: flex-end;
      background-color: lightgreen;
    }

  </style>
</head>
<body>
  
  <h2>Flexbox Layout Demo</h2>
  
  <div class="container">
    <div class="box box1">1</div>
    <div class="box box2">2</div>
    <div class="box box3">3</div>
    <div class="box box4">4</div>
    <div class="box box5">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
  </div>

</body>
</html>
