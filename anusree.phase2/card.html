<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        body {
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .card {
            background: #eee;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .image-box {
            position: relative;
        }

        .image-box img {
            width: 50%;
            border-radius: 10px;
        }

        .overlay {
            position: absolute;
            bottom: -20px;
            right: 10px;
            width: 60%;
        }

        h2 {
            margin-top: 30px;
        }

        p {
            color: gray;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: #ddd;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="image-box">
        <!-- image -->
        <img src="./phone front.jpg" alt="Phone Front">

        <!-- image -->
        <img class="overlay" src="./phone back.jpg" alt="Phone Back">
    </div>

    <h2>Samsung</h2>
    <p>The Battery Beast and The Pixel Master</p>
    <button>Buy Now</button>
</div>

</body>
</html>
