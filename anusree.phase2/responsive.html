<!DOCTYPE html>
<html>
<head>
  <title>Responsive Page</title>

  <!-- VIEWPORT -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    /* NAVBAR */
    .navbar {
      background-color: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    /* FLEX CONTAINER */
    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    /* CARD */
    .card {
      flex: 1;
      padding: 20px;
      background-color: lightblue;
      text-align: center;
    }

    /* 🖥️ DESKTOP (default) */
    /* 3 cards in a row */

    /* 📲 TABLET */
    @media (max-width: 900px) {
      .container {
        flex-wrap: wrap;
      }

      .card {
        flex: 1 1 45%; /* 2 cards per row */
      }
    }

    /* 📱 MOBILE */
    @media (max-width: 600px) {
      .container {
        flex-direction: column;
      }

      .card {
        flex: 1 1 100%; /* 1 card per row */
      }

      .navbar {
        font-size: 14px;
      }
    }

  </style>
</head>

<body>

  <div class="navbar">
    Responsive Website
  </div>

  <div class="container">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
  </div>

</body>
</html>
